# Optional local PostgreSQL for Core (and optionally Agora on host port 5433)
# Docker is NOT required — use native PostgreSQL on Windows/Linux for production-like dev.
# Run from core repo root:
#   docker compose -f infrastructure/docker/docker-compose.yml up -d postgres
#
# v1 jobs use pg-boss (PostgreSQL) — Redis below is optional/deferred.

version: "3.8"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: erganis
      POSTGRES_USER: erganis
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Optional — not required for v1 (pg-boss uses PostgreSQL)
  redis:
    image: redis:7-alpine
    profiles: ["with-redis"]
    ports:
      - "6379:6379"

volumes:
  postgres_data:
